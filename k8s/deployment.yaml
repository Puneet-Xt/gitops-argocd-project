apiVersion: apps/v1
kind: Deployment

metadata:
  name: gitops-app
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: gitops-app

  template:
    metadata:
      labels:
        app: gitops-app

    spec:
      containers:
      - name: gitops-app
        image: gitops-app:v1

        ports:
        - containerPort: 80